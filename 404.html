<!DOCTYPE html>
<html lang="en">

  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1f3a3d;
      --ink-soft: #4a5f62;
      --ink-mute: #7a8a8c;
      --accent: #b8893a;
      --accent-soft: #d8b06a;
      --line: #e4e0d6;
      --card: #ffffff;
      --teal-1: #2c5155;
      --teal-2: #1f3a3d;
      --shadow-md: 0 6px 24px rgba(31,58,61,0.10);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 110% -10%, rgba(184,137,58,0.14), transparent 60%),
        radial-gradient(700px 500px at -10% 110%, rgba(31,58,61,0.10), transparent 60%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-align: center;
    }
    .wrap { width: 100%; max-width: 560px; }
    .logo { max-width: 200px; width: auto; height: auto; margin: 0 auto 28px; display: block; }
    .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; background: rgba(184,137,58,0.12); color: var(--accent); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 22px; }
    .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    h1 { font-family: "Fraunces", Georgia, serif; font-weight: 700; font-size: clamp(72px, 16vw, 120px); letter-spacing: -0.03em; line-height: 1; color: var(--teal-2); margin-bottom: 8px; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 500; }
    h2 { font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: clamp(22px, 4vw, 30px); letter-spacing: -0.02em; line-height: 1.2; color: var(--teal-2); margin-bottom: 16px; }
    p { color: var(--ink-soft); font-size: 17px; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: 999px;
      font-weight: 600; font-size: 15px; cursor: pointer;
      transition: transform .2s var(--ease), box-shadow .25s var(--ease), background .2s var(--ease);
      white-space: nowrap; border: none; text-decoration: none;
    }
    .btn-primary { background: var(--teal-2); color: #fff; box-shadow: 0 6px 18px rgba(31,58,61,0.22); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(31,58,61,0.30); background: var(--teal-1); }
    .btn-ghost { background: transparent; color: var(--teal-2); border: 1.5px solid rgba(31,58,61,0.18); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .ctas { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    @media (prefers-reduced-motion: reduce) { .btn { transition: none; } }
  </style>
</head>

    <div class="ctas">
      <a class="btn btn-primary" href="/">Back to home</a>

    </div>
  </main>
</body>
</html>
