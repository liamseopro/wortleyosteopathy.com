<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />

  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Wortley Osteopathy &mdash; Coming Soon" />

  <meta property="og:url" content="https://wortleyosteopathy.com" />
  <meta name="theme-color" content="#1f3a3d" />
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1f3a3d;
      --ink-soft: #4a5f62;
      --accent: #b8893a;
      --line: #e4e0d6;
      --card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 110% -10%, rgba(184,137,58,0.10), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(31,58,61,0.08), transparent 60%),

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }
    .logo {
      max-width: 240px;
      max-height: 160px;
      width: auto;
      height: auto;
      margin: 0 auto 32px;
      display: block;
    }
    h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 18px;
    }
    p.lede {
      color: var(--ink-soft);
      font-size: 17px;
      max-width: 480px;
      margin: 0 auto 32px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="/assets/logo.png" alt="Wortley Osteopathy logo" />

    <h1>Wortley Osteopathy</h1>

</body>
