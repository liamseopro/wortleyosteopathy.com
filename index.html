<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wortley Osteopathy &mdash; Coming Soon</title>
  <meta name="description" content="Wortley Osteopathy in London, Ontario. A new osteopathic clinic is opening soon. Sign up to be notified when we launch." />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/favicon.svg" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Wortley Osteopathy &mdash; Coming Soon" />
  <meta property="og:description" content="A new osteopathic clinic in Wortley Village, London, Ontario. Opening soon." />
  <meta property="og:url" content="https://wortleyosteopathy.com" />
  <meta name="theme-color" content="#1f3a3d" />
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1f3a3d;
      --ink-soft: #4a5f62;
      --accent: #b8893a;
      --line: #e4e0d6;
      --card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 110% -10%, rgba(184,137,58,0.10), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(31,58,61,0.08), transparent 60%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }
    .logo {
      max-width: 240px;
      max-height: 160px;
      width: auto;
      height: auto;
      margin: 0 auto 32px;
      display: block;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 18px;
    }
    h1 .amp { color: var(--accent); font-weight: 400; font-style: italic; }
    p.lede {
      color: var(--ink-soft);
      font-size: 17px;
      max-width: 480px;
      margin: 0 auto 32px;
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--ink-soft);
    }
    .footer strong { color: var(--ink); font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="/assets/logo.png" alt="Wortley Osteopathy logo" />

    <div class="eyebrow">Wortley Village &middot; London, Ontario</div>
    <h1>Wortley <span class="amp">&amp;</span> Osteopathy</h1>
    <p class="lede">
      A new osteopathic clinic is coming to Wortley Village.
      Gentle, hands-on care to help you move freely and feel your best.
      We&rsquo;re opening soon &mdash; be the first to know when bookings go live.
    </p>

    <div class="footer">
      &copy; <span id="year"></span> <strong>Wortley Osteopathy</strong> &middot; wortleyosteopathy.com
    </div>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
